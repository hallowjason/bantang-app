name: Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm install --no-audit --no-fund

      # rolldown's linux-x64-gnu native binding is an optionalDependency that
      # mac-generated lockfiles omit. Install explicitly for ubuntu runners.
      - run: npm install --no-save --no-audit --no-fund @rolldown/binding-linux-x64-gnu

      - run: npm run lint

      - name: Build (with placeholder env)
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_APP_ID: 'ci-placeholder'
          VITE_SHEET_ID: 'ci-placeholder'
          VITE_API_URL: 'http://localhost:3000'
        run: npm run build

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npm run build
